<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendário Copa do Mundo 2026</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        linear-gradient(rgba(2, 8, 20, 0.78), rgba(2, 8, 20, 0.92)),
        url("https://images.unsplash.com/photo-1431324155629-1a6deb1dec8d?auto=format&fit=crop&w=1600&q=80");
      background-size: cover;
      background-position: center;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 760px;
      background: rgba(255, 255, 255, 0.10);
      border: 1px solid rgba(255, 255, 255, 0.22);
      backdrop-filter: blur(16px);
      border-radius: 28px;
      padding: 42px 34px;
      text-align: center;
      box-shadow: 0 30px 80px rgba(0,0,0,0.45);
    }

    .badge {
      display: inline-block;
      padding: 8px 16px;
      border-radius: 999px;
      background: linear-gradient(90deg, #00c853, #ffd600, #2979ff);
      color: #07111f;
      font-weight: 800;
      font-size: 13px;
      letter-spacing: 1px;
      margin-bottom: 22px;
      text-transform: uppercase;
    }

    h1 {
      font-size: clamp(34px, 6vw, 62px);
      line-height: 1;
      margin-bottom: 18px;
      text-transform: uppercase;
      font-weight: 900;
    }

    h1 span {
      color: #ffd600;
    }

    p {
      font-size: 18px;
      line-height: 1.5;
      color: #e8edf5;
      margin-bottom: 28px;
    }

    .buttons {
      display: grid;
      gap: 14px;
      margin-top: 28px;
    }

    a.button {
      text-decoration: none;
      padding: 18px 22px;
      border-radius: 16px;
      font-size: 17px;
      font-weight: 800;
      transition: 0.25s;
      display: block;
    }

    .primary {
      background: #ffd600;
      color: #07111f;
    }

    .secondary {
      background: rgba(255,255,255,0.13);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.25);
    }

    a.button:hover {
      transform: translateY(-2px);
      filter: brightness(1.08);
    }

    .footer {
      margin-top: 26px;
      font-size: 13px;
      color: #b8c2d4;
    }

    @media (max-width: 520px) {
      .card {
        padding: 34px 22px;
      }

      p {
        font-size: 16px;
      }
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="badge">FIFA World Cup 2026</div>

    <h1>Copa do Mundo <span>2026</span></h1>

    <p>
      Adicione todos os jogos da Copa do Mundo 2026 ao seu calendário
      e acompanhe cada partida direto no celular, Outlook, Google Calendar ou Apple Calendar.
    </p>

    <div class="buttons">
      <a class="button primary" href="webcal://ryze-dev100.github.io/copa2026-calendar/Copa%20do%20Mundo%202026%202.ics">
        Adicionar ao calendário
      </a>

      <a class="button secondary" href="Copa%20do%20Mundo%202026%202.ics">
        Baixar arquivo .ICS
      </a>
    </div>

    <div class="footer">
      Calendário oficial personalizado • Copa do Mundo 2026
    </div>
  </main>
</body>
</html>
